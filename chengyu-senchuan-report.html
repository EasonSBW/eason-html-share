<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>市調簡報製作工具</title>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'PingFang TC', 'Helvetica Neue', sans-serif;
    background: #eef0ef; height:100vh; overflow:hidden;
  }

  #toolbar {
    display:flex; align-items:center; gap:10px;
    background:#1a2332; color:#fff; padding:10px 18px; height:52px;
    position:fixed; top:0; left:0; right:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,.3);
  }
  #toolbar h1 { font-size:15px; font-weight:700; flex:1; }
  .btn { padding:7px 16px; border:none; border-radius:5px; cursor:pointer; font-size:13px; font-weight:600; transition:opacity .2s; }
  .btn:hover { opacity:.85; }
  .btn-pdf { background:#e74c3c; color:#fff; }
  .btn-control { background:#2d8b8b; color:#fff; }

  #main { display:flex; height:calc(100vh - 52px); margin-top:52px; }

  #form-panel {
    width:360px; min-width:320px; background:#fff;
    overflow-y:auto; padding:14px; border-right:1px solid #ddd; flex-shrink:0;
  }
  .case-picker {
    margin-bottom:14px; padding:10px; background:#eef1f8; border-radius:8px;
  }
  .case-picker label { font-size:11px; color:#555; display:block; margin-bottom:4px; font-weight:700; }
  .case-picker select {
    width:100%; font-size:13px; padding:7px 8px; border:1px solid #2d8b8b; border-radius:5px;
    font-weight:700; color:#1a2332; background:#fff;
  }
  #save-status { font-size:10.5px; color:#2d8b8b; margin-top:6px; }
  #reset-btn {
    width:100%; margin-top:6px; padding:6px 8px; font-size:11px; font-weight:600;
    background:#fff; color:#b8543f; border:1px solid #d99; border-radius:5px; cursor:pointer;
  }
  #reset-btn:hover { background:#fdf3f1; }
  .section-title {
    font-size:13px; font-weight:700; color:#1a2332;
    background:#eef1f8; border-left:4px solid #2d8b8b;
    padding:6px 10px; margin:12px 0 8px;
  }
  .section-title:first-child { margin-top:0; }
  .field-row { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
  .field-row label { font-size:11px; color:#555; width:78px; flex-shrink:0; }
  .field-row input, .field-row select {
    flex:1; font-size:11.5px; padding:5px 6px;
    border:1px solid #ccc; border-radius:4px;
    font-family: -apple-system, sans-serif;
  }
  .field-row input:focus, .field-row select:focus { outline:none; border-color:#2d8b8b; }
  .field-row select.fac-input-cat { flex:0 0 92px; }

  #preview-panel {
    flex:1; overflow:auto; background:#888;
    display:flex; flex-direction:column; align-items:center; padding:20px; gap:10px;
  }
  #slide-wrapper { width:100%; max-width:1280px; }
  #page-tabs-bar { width:100%; max-width:1280px; display:flex; align-items:center; gap:8px; }
  #page-select {
    flex:1; min-width:0; font-size:13px; padding:7px 10px; border:1px solid #2d8b8b; border-radius:6px;
    font-weight:700; color:#1a2332; background:#fff;
  }
  .page-tool-btn {
    padding:6px 12px; border-radius:6px; border:1px solid rgba(255,255,255,.55);
    background:transparent; color:#fff; font-size:12.5px; font-weight:700; cursor:pointer; white-space:nowrap;
  }
  .page-tool-btn:hover:not(:disabled) { background:rgba(255,255,255,.15); }
  .page-tool-btn:disabled { opacity:.35; cursor:default; }
  .ip-slide { width:100%; height:100%; display:flex; flex-direction:column; background:#f7f9f8; }
  .ip-header { background:#1a2332; padding:18px 36px; display:flex; align-items:baseline; gap:14px; flex-shrink:0; }
  .ip-title { font-size:24px; font-weight:800; color:#fff; }
  .ip-subtitle { font-size:13px; color:#a8dadc; }
  .ip-body { flex:1; display:flex; align-items:center; justify-content:center; padding:24px; overflow:hidden; }
  .ip-body img { max-width:100%; max-height:100%; object-fit:contain; }
  .ip-placeholder { color:#9aa6a4; font-size:14px; }
  #slide-scaler { position:relative; width:100%; padding-bottom:56.25%; overflow:hidden; }
  #mobile-view { display:none; width:100%; }

  .slide {
    position:absolute; top:0; left:0;
    width:1280px; height:720px; transform-origin:top left;
    background:#f7f9f8; border-radius:14px; overflow:hidden;
    box-shadow:0 8px 40px rgba(0,0,0,.3);
  }
  .slide * { box-sizing:border-box; }
  #slide-inner {
    width:1280px; transform-origin:top left;
    display:flex; flex-direction:column;
  }

  .hd { display:flex; align-items:baseline; gap:14px; padding:14px 36px 6px; flex-shrink:0; }
  .nm { font-size:31px; font-weight:800; color:#1a2332; }
  .pr-pills { margin-left:auto; display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
  .pr-pill { background:#1a2332; color:#a8dadc; font-size:11px; font-weight:700;
             padding:5px 11px; border-radius:16px; white-space:nowrap; }
  .pr-pill b { color:#fff; font-size:12.5px; }

  .bd { display:flex; gap:0; padding:0 36px 4px; flex-shrink:0; }
  .data-col { flex:1.45; display:flex; gap:9px; min-width:0; }
  .rail { width:4px; border-radius:2px; flex-shrink:0; background:#2d8b8b; }
  .grp { flex:1; min-width:0; }
  .grp-label { font-size:11.5px; font-weight:800; color:#2d8b8b; letter-spacing:1px; margin:4px 0 2px; text-transform:uppercase; }
  .grp-label:first-child { margin-top:0; }

  .pair-row { display:grid; grid-template-columns: 84px 1fr 84px 1fr; gap:0 10px; padding:1.6px 0; border-bottom:1px solid #e9eeec; }
  .pair-row b { font-size:11.5px; color:#7a8a87; font-weight:600; }
  .pair-row span { font-size:12.5px; color:#1a2332; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .full-row { display:flex; gap:10px; padding:1.6px 0; border-bottom:1px solid #e9eeec; }
  .full-row b { font-size:11.5px; color:#7a8a87; font-weight:600; flex-shrink:0; width:84px; }
  .full-row span { font-size:11.5px; color:#1a2332; font-weight:600; }

  .room-row { display:flex; align-items:baseline; gap:10px; padding:1.6px 0; border-bottom:1px solid #e9eeec; }
  .room-row b { font-size:11.5px; color:#7a8a87; font-weight:600; flex-shrink:0; width:84px; }
  .room-row span { font-size:14px; color:#1a2332; font-weight:800; }

  .ph-wrap { flex:0.62; padding-left:16px; }
  .ph { height:100%; min-height:75px; background:#dde8e4; border-radius:12px; overflow:hidden; position:relative; }
  .ph img { width:100%; height:100%; object-fit:cover; object-position:center 30%; display:block; }
  .ph .cap { position:absolute; bottom:0; left:0; right:0; background:rgba(26,35,50,.7); color:#fff;
             font-size:8px; text-align:center; padding:3px 6px; }

  .mat-section { padding:5px 36px 4px; background:#fff; border-top:1px solid #e6ebe9;
                 display:flex; gap:12px; flex-shrink:0; }
  .mat-col { flex:1; min-width:0; display:flex; flex-direction:column; }
  .mat-hd { background:#1a2332; color:#a8dadc; font-size:11px; font-weight:800; letter-spacing:.4px;
            text-align:center; padding:3px 3px; border-radius:6px; margin-bottom:3.5px; }
  .mat-item { font-size:11px; padding:2px 2px; border-bottom:1px solid #f0f3f2; line-height:1.15; }
  .mat-item .lb { color:#2d8b8b; font-weight:700; display:block; }
  .mat-item .vl { color:#1a2332; font-weight:500; }

  .fac-section { flex:1; padding:5px 36px 9px; background:#f4f9f7; border-top:1px solid #e6ebe9;
                 display:flex; flex-direction:column; min-height:0; }
  .fac-top { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:5px; }
  .fac-label { font-size:11px; font-weight:800; color:#2d8b8b; letter-spacing:1px; text-transform:uppercase; }
  .fac-legend { display:flex; gap:10px; }
  .fac-legend span { font-size:9.5px; color:#5a6a68; display:flex; align-items:center; gap:4px; }
  .dot { width:7px; height:7px; border-radius:50%; display:inline-block; }
  .dot.sport { background:#2d8b8b; }
  .dot.social { background:#3a4a7a; }
  .dot.service { background:#b8893f; }
  .dot.green { background:#4f9d4f; }

  .fac-chips { display:flex; flex-wrap:wrap; gap:7px; align-content:flex-start; }
  .fac-chip { border-radius:16px; padding:5px 13px; font-size:12.5px; font-weight:700; line-height:1; }
  .fac-chip.sport   { background:#dcefed; color:#1c6b69; }
  .fac-chip.social  { background:#e1e4f2; color:#2e3a6b; }
  .fac-chip.service { background:#f5e9d3; color:#8a5f1f; }
  .fac-chip.green   { background:#e1f0e1; color:#2e6b2e; }

  .upload-btn {
    font-size:11px; padding:5px 10px; border:1px solid #2d8b8b; border-radius:4px;
    background:#fff; color:#2d8b8b; cursor:pointer; font-weight:700;
  }
  .upload-btn:hover { background:#eef1f8; }
  .upload-status { font-size:10.5px; color:#2d8b8b; }
  .upload-status a { color:#b8543f; margin-left:6px; cursor:pointer; text-decoration:underline; }

  .ref-links-section { margin-top:12px; }
  .ref-link-list { display:flex; flex-direction:column; gap:3px; margin-top:6px; }
  .ref-link-item {
    display:flex; align-items:center; gap:8px; padding:5px 8px;
    border-radius:4px; background:#f8fafb; text-decoration:none;
    font-size:12px; color:#1a2332; transition:background 0.15s;
    border:1px solid #e5eaf2;
  }
  .ref-link-item:hover { background:#e8f4f4; border-color:#b2d8d8; }
  .ref-link-name { font-weight:700; color:#2d8b8b; flex:0 0 90px; }
  .ref-link-desc { font-size:10.5px; color:#888; flex:1; }

  .export-menu {
    display:none; position:absolute; top:48px; right:18px; z-index:150;
    background:#fff; border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,.25);
    overflow:hidden; min-width:160px;
  }
  .export-menu.active { display:block; }
  .export-menu button {
    display:block; width:100%; text-align:left; padding:10px 16px; border:none;
    background:#fff; color:#1a2332; font-size:13px; font-weight:600; cursor:pointer;
  }
  .export-menu button:hover { background:#eef1f8; color:#2d8b8b; }

  .sg-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:8px; padding-right:100px; }
  .sg-head h2 { color:#1a2332; font-size:18px; }
  .sg-head-title { display:flex; align-items:center; gap:12px; }
  .sg-absorb-btn {
    background:#eef1f8; color:#2d8b8b; border:1px solid #d8e4e2; border-radius:7px;
    padding:5px 13px; font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap;
  }
  .sg-absorb-btn:hover { background:#dcefed; }

  .modal-overlay {
    display:none; position:fixed; inset:0; background:rgba(26,35,50,.55); z-index:200;
    align-items:center; justify-content:center;
  }
  .modal-overlay.active { display:flex; }
  .modal-box {
    background:#fff; border-radius:16px; padding:28px 30px; width:420px; max-width:92vw;
    max-height:80vh; overflow:auto; position:relative; box-shadow:0 20px 60px rgba(0,0,0,.3);
  }
  .modal-box h3 { color:#1a2332; font-size:17px; margin-bottom:14px; }
  .modal-close {
    position:absolute; top:16px; right:18px; background:none; border:none;
    font-size:16px; color:#9aa6a4; cursor:pointer;
  }
  .modal-close:hover { color:#5a6a68; }
  .absorb-note { font-size:11px; color:#9aa6a4; margin-bottom:16px; line-height:1.5; }
  .absorb-row { display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid #f0f3f2; }
  .absorb-col { font-weight:800; color:#1a2332; font-size:13px; flex:0 0 50px; }
  .absorb-bar-wrap { flex:1; height:8px; background:#eef1f0; border-radius:4px; overflow:hidden; }
  .absorb-bar { height:100%; background:#2d8b8b; border-radius:4px; }
  .absorb-pct { font-weight:800; color:#2d8b8b; font-size:13px; flex:0 0 42px; text-align:right; }
  .absorb-count { font-size:10.5px; color:#9aa6a4; flex:0 0 54px; text-align:right; }
  .sg-legend { display:flex; gap:14px; }

  .sg-view-tabs { display:flex; gap:6px; margin-bottom:14px; }
  .sg-view-tab {
    background:#f4f6f5; color:#7a8a87; border:1px solid #e6ebe9; border-radius:7px;
    padding:6px 14px; font-size:12.5px; font-weight:700; cursor:pointer;
  }
  .sg-view-tab.active { background:#1a2332; color:#fff; border-color:#1a2332; }
  .sg-view-tab:hover:not(.active) { background:#eef1f0; }
  .txn-wrap { overflow-x:auto; }
  .txn-table { border-collapse:collapse; width:100%; font-size:12.5px; }
  .txn-table th, .txn-table td { padding:9px 10px; text-align:center; white-space:nowrap; }
  .txn-table thead th { color:#5a6a68; font-size:11.5px; font-weight:700; border-bottom:2px solid #e6ebe9; cursor:pointer; user-select:none; }
  .txn-table thead th:hover { color:#2d8b8b; }
  .txn-table thead th.sorted { color:#2d8b8b; }
  .txn-table thead th .sort-arrow { font-size:9px; margin-left:2px; opacity:.5; }
  .txn-table thead th.sorted .sort-arrow { opacity:1; }
  .txn-table tbody tr { border-bottom:1px solid #f0f3f2; }
  .txn-table tbody tr:hover { background:#f7f9f8; }
  .txn-table tbody tr.txn-excluded { opacity:.6; }
  .txn-idx { color:#9aa6a4; font-weight:600; }
  .txn-unit { font-weight:800; color:#1a2332; }
  .txn-total, .txn-price { font-weight:800; color:#1a2332; }
  .txn-area { color:#5a6a68; }
  .txn-park-price { font-weight:700; color:#1a2332; }
  .txn-park-type { display:block; font-size:10px; color:#9aa6a4; }
  .txn-date { display:inline-block; background:#eef1f0; color:#5a6a68; font-weight:700; padding:3px 10px; border-radius:6px; font-size:11.5px; }
  .sg-legend-item { font-size:12px; color:#5a6a68; display:flex; align-items:center; gap:5px; }
  .sg-dot { width:9px; height:9px; border-radius:50%; display:inline-block; }
  .rt-badge { display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; border-radius:50%; font-size:9.5px; font-weight:800; line-height:1; vertical-align:middle; }
  .sg-body { display:flex; gap:20px; align-items:flex-start; }
  .sg-sidebar { flex:0 0 280px; position:sticky; top:0; }
  .sg-main { flex:1; min-width:0; }
  .sg-wrap { overflow-x:auto; }
  .sg-table { border-collapse:collapse; font-size:12px; text-align:center; }
  .sg-table th, .sg-table td { padding:4px 6px; min-width:64px; }
  .sg-table thead th { color:#2d8b8b; font-weight:700; font-size:11px; line-height:1.5; }
  .sg-col-area { display:block; font-weight:600; color:#9aa6a4; font-size:9.5px; letter-spacing:.2px; }
  .sg-table tbody th { color:#7a8a87; font-weight:700; text-align:right; padding-right:10px; white-space:nowrap; }
  .sg-table thead th:first-child,
  .sg-table tbody th { position:sticky; left:0; background:#fff; z-index:1; }
  .sg-cell { border-radius:6px; padding:5px 4px; font-weight:700; line-height:1.3; cursor:default; }
  .sg-cell-excluded { outline:1.5px dashed currentColor; outline-offset:-1.5px; opacity:.75; }
  .sg-source { margin-top:14px; font-size:11px; color:#9aa6a4; }

  .sg-tooltip {
    display:none; position:fixed; z-index:300; background:#1a2332; color:#fff;
    border-radius:8px; padding:10px 13px; font-size:12px; line-height:1.7;
    box-shadow:0 8px 24px rgba(0,0,0,.3); pointer-events:none; white-space:nowrap;
  }
  .sg-tooltip b { color:#a8dadc; font-weight:700; display:inline-block; width:64px; }

  .sg-stats { background:#fff; border:1px solid #e6ebe9; border-radius:14px; padding:20px; display:flex; flex-direction:column; gap:16px; }
  .sg-stats-overall { display:flex; }
  .sg-stat-main { flex:1; text-align:center; }
  .sg-stat-main + .sg-stat-main { border-left:1px solid #e6ebe9; }
  .sg-stat-label { font-size:11.5px; color:#7a8a87; font-weight:700; margin-bottom:5px; }
  .sg-stat-num { font-size:23px; font-weight:800; color:#1a2332; line-height:1.2; }
  .sg-stat-num small { font-size:12px; font-weight:700; color:#5a6a68; margin-left:2px; }
  .sg-stat-pill { display:inline-block; margin-top:7px; background:#f0f3f2; color:#5a6a68; font-size:11px; font-weight:700; padding:3px 11px; border-radius:10px; }
  .sg-stats-divider { height:1px; background:#e6ebe9; }
  .sg-stats-types { display:flex; flex-direction:column; gap:10px; }
  .sg-type-row { display:flex; align-items:flex-start; background:#f7f9f8; border-radius:10px; padding:12px 16px; gap:12px; }
  .sg-type-label { font-size:14px; font-weight:800; color:#1a2332; flex:0 0 auto; }
  .sg-type-count { display:block; font-size:10px; color:#9aa6a4; font-weight:600; margin-top:1px; }
  .sg-type-metrics { flex:1; display:flex; flex-direction:column; gap:8px; }
  .sg-type-stat { text-align:left; display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; }
  .sg-type-stat .sg-stat-label { font-size:10px; margin-bottom:0; flex:0 0 50px; }
  .sg-type-stat .sg-stat-num { font-size:15px; }
  .sg-type-stat .sg-stat-num small { font-size:10px; }
  .sg-type-stat .sg-stat-pill { font-size:9.5px; padding:2px 8px; margin-top:0; }

  @media (max-width: 768px) {
    .sg-body { flex-direction:column; }
    .sg-sidebar { flex:1 1 auto; width:100%; position:static; }
  }

  /* ===== 手機版 mobile-view 元件樣式 ===== */
  .mv-hero { position:relative; width:100%; }
  .mv-hero img { width:100%; height:auto; display:block; }
  .mv-hero-cap { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(transparent,rgba(0,0,0,.55)); color:#fff; font-size:11px; padding:20px 16px 8px; }
  .mv-title { padding:16px 18px 10px; background:#fff; }
  .mv-title h1 { font-size:22px; font-weight:800; color:#1a2332; margin-bottom:4px; }
  .mv-loc { font-size:12.5px; color:#7a8a87; }
  .mv-statbar { display:flex; background:#1a2332; }
  .mv-stat { flex:1; text-align:center; padding:12px 6px; border-right:1px solid rgba(255,255,255,.12); }
  .mv-stat:last-child { border-right:none; }
  .mv-stat-lb { font-size:10.5px; color:#a8dadc; margin-bottom:3px; }
  .mv-stat-vl { font-size:14px; color:#fff; font-weight:800; line-height:1.3; }
  .mv-stat-sub { display:block; font-size:10px; color:#a8dadc; font-weight:600; margin-top:2px; }
  .mv-section { padding:16px 18px; border-bottom:8px solid #eef0ef; background:#fff; }
  .mv-section h2 { font-size:14px; font-weight:800; color:#2d8b8b; margin-bottom:10px; }
  .mv-row { display:flex; justify-content:space-between; gap:10px; padding:7px 0; border-bottom:1px solid #f0f3f2; font-size:14px; }
  .mv-row:last-child { border-bottom:none; }
  .mv-row b { color:#7a8a87; font-weight:600; font-size:12.5px; flex-shrink:0; }
  .mv-row span { color:#1a2332; font-weight:700; text-align:right; }
  .mv-room-highlight { background:#f4f9f7; border-radius:10px; padding:12px 14px; margin-bottom:10px; }
  .mv-room-val { display:block; font-size:18px; font-weight:800; color:#1a2332; }
  .mv-room-lb { display:block; font-size:12px; color:#7a8a87; margin-top:2px; }
  .mv-mat-group { margin-bottom:10px; }
  .mv-mat-title { font-size:12px; font-weight:800; color:#fff; background:#1a2332; display:inline-block; padding:3px 10px; border-radius:6px; margin-bottom:5px; }
  .mv-mat-line { font-size:13px; color:#1a2332; line-height:1.6; }
  .mv-mat-line b { color:#2d8b8b; font-weight:700; }
  .mv-fac-chips { display:flex; flex-wrap:wrap; gap:7px; }
  .mv-fac-chip { border-radius:14px; padding:6px 13px; font-size:13px; font-weight:700; }
  .mv-fac-chip.sport { background:#dcefed; color:#1c6b69; }
  .mv-fac-chip.social { background:#e1e4f2; color:#2e3a6b; }
  .mv-fac-chip.service { background:#f5e9d3; color:#8a5f1f; }

<div id="toolbar">

    <div class="field-row"><label>價差</label><input id="f-pricegap" oninput="render()"></div>

</div><!-- /main -->

/* ───────────── 工具函式 ───────────── */
function v(id) { const el = document.getElementById(id); return el ? el.value : ''; }
function esc(s) { return (s ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
// 本機快取若是在某個欄位還不存在時就被存進去，merge 後該欄位值會是字面上的字串 "undefined"
// （因為 input.value = undefined 在 DOM 裡會被轉成 "undefined" 文字，render() 又把它存回 localStorage）。
// 這裡擋掉這個壞值，退回查證過的 CASES 預設，順便讓下一次自動儲存覆寫掉壞掉的快取。
function safeField(cached, fallback) { return (cached === undefined || cached === null || cached === 'undefined') ? fallback : cached; }

function scaleSlide() {
  const scaler = document.getElementById('slide-scaler');
  const slide = document.getElementById('slide');
  const scale = scaler.offsetWidth / 1280;
  slide.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', scaleSlide);

/* ───────────── 本機儲存（IndexedDB） ───────────── */
const LAST_CASE_KEY = 'mschk_last_case';
const LEGACY_STORAGE_PREFIX = 'mschk_case_';
const IDB_NAME = 'mschk_db';
const IDB_STORE = 'case_overrides';
let currentCaseKey = null;
let uploadedPhotoDataURL = null;
let imagePages = [];   // 目前案子的圖片頁，不含市調總覽頁
let activePageIdx = 0; // 0 = 市調總覽，1..N 對應 imagePages[idx-1]

function pagesKey(key) { return key + ':pages'; }
async function idbGetPages(key) {
  const saved = await idbGet(pagesKey(key));
  if (saved) return saved;
  // 還沒有使用者自訂過：退回案子內建的預設圖片頁（深拷貝，避免直接改到 CASES 的原始陣列）
  const defaults = CASES[key] && CASES[key].imagePages;
  return defaults ? JSON.parse(JSON.stringify(defaults)) : [];
}
async function idbPutPages(key, pages) { return idbPut(pagesKey(key), pages); }

let _pagesSaveTimer = null;
function persistImagePages() {
  clearTimeout(_pagesSaveTimer);
  const key = currentCaseKey;
  const pages = imagePages;
  _pagesSaveTimer = setTimeout(() => { idbPutPages(key, pages); }, 400);
}

function handlePhotoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    uploadedPhotoDataURL = ev.target.result;
    renderPhotoUploadStatus();
    render();
  };
  reader.readAsDataURL(file);
}

function clearPhotoUpload() {
  uploadedPhotoDataURL = null;
  document.getElementById('photo-upload-input').value = '';
  renderPhotoUploadStatus();
  render();
}

function renderPhotoUploadStatus() {
  const el = document.getElementById('photo-upload-status');
  if (!el) return;
  el.innerHTML = uploadedPhotoDataURL
    ? '已上傳本機圖片<a onclick="clearPhotoUpload()">✕ 移除</a>'
    : '';
}

function renderPageTabs() {
  const sel = document.getElementById('page-select');
  if (!sel) return;
  let html = `<option value="0">📋 市調總覽</option>`;
  html += imagePages.map((p, i) => `<option value="${i+1}">${esc(p.title || ('（圖片頁 ' + (i+1) + '）'))}</option>`).join('');
  sel.innerHTML = html;
  sel.value = activePageIdx;

  const delBtn = document.getElementById('delete-page-btn');
  if (delBtn) delBtn.disabled = activePageIdx === 0;
  const upBtn = document.getElementById('page-move-up-btn');
  if (upBtn) upBtn.disabled = activePageIdx <= 1;
  const downBtn = document.getElementById('page-move-down-btn');
  if (downBtn) downBtn.disabled = activePageIdx === 0 || activePageIdx === imagePages.length;
}

function moveActivePage(delta) {
  if (activePageIdx === 0) return;
  const from = activePageIdx - 1;
  const to = from + delta;
  if (to < 0 || to >= imagePages.length) return;
  const moved = imagePages.splice(from, 1)[0];
  imagePages.splice(to, 0, moved);
  activePageIdx = to + 1;
  persistImagePages();
  renderPageTabs();
  render();
}

function switchToPage(idx) {
  activePageIdx = idx;
  const isImage = idx > 0;
  document.getElementById('form-market-fields').style.display = isImage ? 'none' : '';
  document.getElementById('form-image-fields').style.display = isImage ? '' : 'none';
  if (isImage) applyImagePageForm(imagePages[idx - 1]);
  renderPageTabs();
  render();
}

function addImagePage() {
  imagePages.push({ id: 'p' + Date.now(), title: '', subtitle: '', imageURL: '', imageDataURL: null });
  persistImagePages();
  switchToPage(imagePages.length);
}

function deleteImagePage(i) {
  if (i < 0 || i >= imagePages.length) return;
  if (!confirm('確定刪除這張圖片頁？')) return;
  imagePages.splice(i, 1);
  persistImagePages();
  switchToPage(0);
}

function applyImagePageForm(page) {
  document.getElementById('ip-title').value = page.title || '';
  document.getElementById('ip-subtitle').value = page.subtitle || '';
  document.getElementById('ip-url').value = page.imageURL || '';
  document.getElementById('ip-upload-status').innerHTML = page.imageDataURL
    ? '已上傳本機圖片<a onclick="clearImagePageUpload()">✕ 移除</a>' : '';
}

function onImagePageFieldInput() {
  const p = imagePages[activePageIdx - 1];
  if (!p) return;
  p.title = v('ip-title');
  p.subtitle = v('ip-subtitle');
  p.imageURL = v('ip-url');
  persistImagePages();
  renderPageTabs();
  render();
}

function handleImagePageUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const p = imagePages[activePageIdx - 1];
  if (!p) return;
  const reader = new FileReader();
  reader.onload = ev => {
    p.imageDataURL = ev.target.result;
    document.getElementById('ip-upload-status').innerHTML = '已上傳本機圖片<a onclick="clearImagePageUpload()">✕ 移除</a>';
    persistImagePages();
    render();
  };
  reader.readAsDataURL(file);
}

function clearImagePageUpload() {
  const p = imagePages[activePageIdx - 1];
  if (!p) return;
  p.imageDataURL = null;
  document.getElementById('ip-upload-input').value = '';
  document.getElementById('ip-upload-status').innerHTML = '';
  persistImagePages();
  render();
}

function renderImagePageSlide() {
  const p = imagePages[activePageIdx - 1];
  if (!p) return;
  const src = p.imageDataURL || p.imageURL;
  document.getElementById('slide').innerHTML = `
    <div class="ip-slide">
      <div class="ip-header">
        <span class="ip-title">${esc(p.title || '圖片頁')}</span>

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

async function idbGet(key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const req = db.transaction(IDB_STORE, 'readonly').objectStore(IDB_STORE).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = e => reject(e.target.error);
  });
}

async function idbPut(key, value) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(value, key);
    tx.oncomplete = resolve;
    tx.onerror = e => reject(e.target.error);
  });
}

async function idbDelete(key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).delete(key);
    tx.oncomplete = resolve;
    tx.onerror = e => reject(e.target.error);
  });
}

// 把舊版 localStorage 的覆寫資料搬進 IndexedDB（只搬一次，不刪除舊資料）
async function migrateLegacyCase(key) {
  const existing = await idbGet(key);
  if (existing !== undefined) return;
  const legacy = localStorage.getItem(LEGACY_STORAGE_PREFIX + key);
  if (!legacy) return;
  try {
    await idbPut(key, JSON.parse(legacy));
  } catch (e) {
    console.warn('搬遷舊版本機資料失敗：', key, e);
  }
}

function positionTooltip(evt) {
  const tip = document.getElementById('sg-tooltip');
  const pad = 14;
  let x = evt.clientX + pad, y = evt.clientY + pad;
  const rect = tip.getBoundingClientRect();
  if (x + rect.width > window.innerWidth) x = evt.clientX - rect.width - pad;
  if (y + rect.height > window.innerHeight) y = evt.clientY - rect.height - pad;
  tip.style.left = x + 'px';
  tip.style.top = y + 'px';
}

function computeSalesGridStats(sg) {
  const cells = [];
  sg.rows.forEach(r => sg.columns.forEach(col => {
    const cell = r.cells[col];
    if (cell && cell.cat === 'res' && !cell.excluded) cells.push({ price: cell.price, total: cell.total, roomType: cell.roomType || (sg.columnRoomType ? sg.columnRoomType[col] : null) });
  }));
  if (!cells.length) return null;
  const summarize = list => {
    const prices = list.map(c => c.price), totals = list.map(c => c.total);
    return {
      n: list.length,
      avgPrice: prices.reduce((a,b) => a+b, 0) / list.length,
      minPrice: Math.min(...prices), maxPrice: Math.max(...prices),
      avgTotal: totals.reduce((a,b) => a+b, 0) / list.length,
      minTotal: Math.min(...totals), maxTotal: Math.max(...totals),
    };
  };
  const byType = {};
  cells.forEach(c => { if (c.roomType) (byType[c.roomType] = byType[c.roomType] || []).push(c); });
  return {
    overall: summarize(cells),
    types: Object.keys(byType).sort().map(t => ({ type: t, ...summarize(byType[t]) })),
  };
}

function parseParkPrice(str) {
  const m = (str || '').match(/(\d+(?:\.\d+)?)\s*[–-]\s*(\d+(?:\.\d+)?)\s*萬\s*\(均\s*(\d+(?:\.\d+)?)\s*萬\)/);
  return m ? { min: m[1], max: m[2], avg: m[3] } : null;
}

          <div class="sg-stat-pill">${park.min} - ${park.max} 萬</div>
        </div>

  return `<div class="sg-stats">${overallHtml}${typesHtml}${parkHtml}</div>`;
}

/* ───────────── 戶別去化率彈出視窗 ───────────── */
// 分母：銷控表裡「至少有一戶有成交紀錄」的樓層數（視為該案已知的住宅樓層範圍）。
// 分子：該戶別在這些樓層裡實際有成交紀錄的樓層數。兩者都是直接讀 salesGrid 現有資料動態算出，
// 資料更新（新增成交筆數、新增樓層）後再次打開視窗會自動重新計算，不是寫死的數字。
function computeAbsorptionRates(sg) {
  const resFloors = sg.rows.filter(r => sg.columns.some(col => r.cells[col] && r.cells[col].cat === 'res'));
  const total = resFloors.length;
  if (!total) return [];
  return sg.columns
    .filter(col => sg.rows.some(r => r.cells[col] && r.cells[col].cat === 'res'))
    .map(col => {
      const sold = resFloors.filter(r => r.cells[col] && r.cells[col].cat === 'res').length;
      return { col, sold, total, rate: sold / total };
    });
}

let salesGridViewMode = 'grid'; // 'grid' | 'txn'
let txnSortState = { key: 'date', dir: 'desc' };

function flattenTransactions(sg) {
  const list = [];
  sg.rows.forEach(r => {
    sg.columns.forEach(col => {
      const cell = r.cells[col];
      if (cell) list.push({ unit: col, floor: r.floor, floorNum: parseInt(r.floor), ...cell });
    });
  });
  return list;
}

function sortTransactions(list, key, dir) {
  return [...list].sort((a, b) => {
    let av, bv;
    if (key === 'park') { av = a.park ? a.park.price : -1; bv = b.park ? b.park.price : -1; }
    else if (key === 'floor') { av = a.floorNum; bv = b.floorNum; }
    else { av = a[key]; bv = b[key]; }
    if (typeof av === 'string') return dir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
    return dir === 'asc' ? av - bv : bv - av;
  });
}

function setTxnSort(key) {
  if (txnSortState.key === key) { txnSortState.dir = txnSortState.dir === 'asc' ? 'desc' : 'asc'; }
  else { txnSortState = { key, dir: 'desc' }; }
  renderSgMain(currentCaseKey);
}

function renderSgMain(key) {
  const sg = CASES[key].salesGrid;
  const crown = findCrownCell(sg);

  const headerHtml = sg.columns.map(col => {
    const area = sg.columnArea && sg.columnArea[col];
    const roomType = sg.columnRoomType && sg.columnRoomType[col];
    const style = roomType ? (() => {
      const { fg } = ROOM_TYPE_COLORS[roomType] || ROOM_TYPE_FALLBACK;
      return ` style="color:${fg}"`;
    })() : '';
    return `<th${style}>${esc(col)}${area ? `<span class="sg-col-area">${area}坪</span>` : ''}</th>`;
  }).join('');

  let hasExcluded = false;
  const bodyHtml = sg.rows.map(r => {
    const cellsHtml = sg.columns.map(col => {
      const cell = r.cells[col];
      if (!cell) return '<td></td>';
      const cat = sg.categories[cell.cat];
      const crownMark = cell === crown ? '👑' : '';
      const excludedCls = cell.excluded ? ' sg-cell-excluded' : '';
      const excludedMark = cell.excluded ? '<sup>※</sup>' : '';
      if (cell.excluded) hasExcluded = true;
      return `<td><div class="sg-cell${excludedCls}" style="background:${cat.bg};color:${cat.fg}" onmouseenter="showCellTooltip(event,'${esc(r.floor)}','${esc(col)}')" onmousemove="positionTooltip(event)" onmouseleave="hideCellTooltip()">${crownMark}${cell.price}${excludedMark}<br>${cell.total}萬</div></td>`;
    }).join('');
    return `<tr><th>${esc(r.floor)}</th>${cellsHtml}</tr>`;
  }).join('');
  const excludedNote = hasExcluded ? '　※明顯偏離其他成交價，疑似特殊戶，不列入上方統計平均' : '';

  const gridHtml = `
    <div class="sg-wrap">
      <table class="sg-table">
        <thead><tr><th></th>${headerHtml}</tr></thead>
        <tbody>${bodyHtml}</tbody>
      </table>
    </div>
    <div class="sg-source">資料來源：${esc(sg.source)}${excludedNote}</div>`;

  const tabsHtml = `
    <div class="sg-view-tabs">
      <button class="sg-view-tab ${salesGridViewMode === 'grid' ? 'active' : ''}" onclick="setSalesGridView('grid')">📊 銷控表</button>

/* 依資料量自動縮放 #slide-inner，讓內容剛好塞進固定的 1280×720 畫框 */
function fitSlideContent() {
  const inner = document.getElementById('slide-inner');
  if (!inner) return;
  inner.style.transform = 'none';
  inner.style.width = '1280px';
  const naturalHeight = inner.scrollHeight;
  const scale = Math.min(1, 720 / naturalHeight);
  inner.style.transform = `scale(${scale})`;
  inner.style.width = (1280 / scale) + 'px';
}

function closeExportMenuOnOutsideClick(e) {

function getImgSize(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve([img.naturalWidth, img.naturalHeight]);
    img.onerror = () => resolve([1280, 720]);
    img.src = src;
  });
}
function fitContain(iw, ih, bw, bh) {
  const s = Math.min(bw / iw, bh / ih);
  return { w: iw * s, h: ih * s, ox: (bw - iw * s) / 2, oy: (bh - ih * s) / 2 };
}
// 等容器內所有 <img> 都載入完成（成功或失敗都算結束），最多等 timeoutMs，避免列印/截圖時圖片還沒載完就被印成空白
function waitForImages(container, timeoutMs) {
  const pending = [...container.querySelectorAll('img')].filter(img => !img.complete);
  if (!pending.length) return Promise.resolve();
  return Promise.race([
    Promise.all(pending.map(img => new Promise(resolve => {
      img.addEventListener('load', resolve, { once: true });
      img.addEventListener('error', resolve, { once: true });
    }))),
    new Promise(resolve => setTimeout(resolve, timeoutMs)),
  ]);
}
async function _blobToDataURL(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(blob);
  });
}
// 把圖片網址轉成 data URL（本機上傳的圖片本身已經是 data:，直接回傳）；
// 直接 fetch 若被 CORS 擋，自動改走 corsproxy.io 代理再試一次
async function fetchAsDataURL(src) {
  if (src.startsWith('data:')) return src;
  try {
    const res = await fetch(src);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await _blobToDataURL(await res.blob());
  } catch {
    const proxy = 'https://corsproxy.io/?' + encodeURIComponent(src);
    const res = await fetch(proxy);
    if (!res.ok) throw new Error('proxy HTTP ' + res.status);
    return await _blobToDataURL(await res.blob());
  }
}

async function exportPptx() {
  if (typeof PptxGenJS === 'undefined') {
    alert('PowerPoint 匯出元件載入失敗，請確認網路連線後重新整理頁面再試一次。');
    return;
  }
  const pptx = new PptxGenJS();
  pptx.defineLayout({ name: 'SLIDE16x9', width: 10, height: 5.625 });
  pptx.layout = 'SLIDE16x9';

  const savedPageIdx = activePageIdx;

  // 第 1 頁：市調總覽，截圖保留 100% 設計外觀
  activePageIdx = 0;
  render();
  const slideEl = document.getElementById('slide');
  await waitForImages(slideEl, 4000);
  const prevTransform = slideEl.style.transform;
  slideEl.style.transform = 'scale(1)';
  await new Promise(r => setTimeout(r, 30));

  let marketImgData = null;
  try {
    const canvas = await html2canvas(slideEl, {
      scale: 2, useCORS: true, allowTaint: true,
      width: 1280, height: 720, backgroundColor: '#ffffff',
    });
    marketImgData = canvas.toDataURL('image/jpeg', 0.95);
  } catch (e) {
    console.warn('市調總覽截圖失敗（可能是外觀照片網址不支援跨網域讀取）', e);
  }
  slideEl.style.transform = prevTransform;

  const marketSlide = pptx.addSlide();
  if (marketImgData) {
    marketSlide.addImage({ data: marketImgData, x: 0, y: 0, w: 10, h: 5.625 });
  } else {
    marketSlide.background = { color: 'F4F9F7' };
    marketSlide.addText(
      '市調總覽頁截圖失敗（可能是外觀照片網址不支援跨網域讀取）\n建議改用左側「本機上傳」功能上傳照片後，重新匯出一次。',
      { x: 0.5, y: 2.3, w: 9, h: 1.2, fontSize: 14, color: 'B8543F', align: 'center', valign: 'middle' }
    );
  }

  // 第 2 頁起：每張圖片頁用原生文字＋圖片元件（標題在 PowerPoint 裡可直接編輯）
  for (const p of imagePages) {
    const pSlide = pptx.addSlide();
    pSlide.background = { color: 'F7F9F8' };
    pSlide.addText('', { x: 0, y: 0, w: 10, h: 0.6, fill: { color: '1A2332' } });
    pSlide.addText(p.title || '圖片頁', {
      x: 0.3, y: 0.08, w: 6.3, h: 0.44,
      fontSize: 20, bold: true, color: 'FFFFFF', fontFace: 'PingFang TC', valign: 'middle',
    });
    if (p.subtitle) {
      pSlide.addText(p.subtitle, {
        x: 6.6, y: 0.15, w: 3.1, h: 0.3,
        fontSize: 11, color: 'A8DADC', fontFace: 'PingFang TC', align: 'right', valign: 'middle',
      });
    }
    const src = p.imageDataURL || p.imageURL;
    if (src) {
      try {
        // 一律自己先把圖片轉成 data URL 再交給 pptxgenjs：
        // 如果直接把外部網址用 path 交給 pptxgenjs，它內部會自己發一個跨網域請求去抓圖，
        // 那個請求失敗時是「沒人接住的 Promise rejection」，會讓整個匯出流程在背景默默掛掉
        // （不會跳出任何錯誤訊息，使用者只會看到「沒有反應」）。改成自己 fetch，失敗才能真的被這裡的 catch 接住。
        const dataUrl = await fetchAsDataURL(src);
        const [iw, ih] = await getImgSize(dataUrl);
        const BOX_X = 0.2, BOX_Y = 0.75, BOX_W = 9.6, BOX_H = 4.7;
        const f = fitContain(iw, ih, BOX_W, BOX_H);
        pSlide.addImage({ data: dataUrl, x: BOX_X + f.ox, y: BOX_Y + f.oy, w: f.w, h: f.h });
      } catch (e) {
        console.warn('圖片頁圖片載入失敗（可能是圖片網址不支援跨網域讀取）：', p.title, e);
        pSlide.addText(
          '圖片載入失敗（可能是網址不支援跨網域讀取）\n建議改用左側「本機上傳」功能後再匯出一次。',
          { x: 0.5, y: 2.3, w: 9, h: 1.2, fontSize: 13, color: 'B8543F', align: 'center', valign: 'middle' }
        );
      }
    }
  }

  activePageIdx = savedPageIdx;
  render();

  // 銷控表頁（完整截圖嵌入，同 PDF 做法）
  if (currentCaseKey && CASES[currentCaseKey]?.salesGrid) {
    const sgCanvas = await captureSalesGridCanvas();
    if (sgCanvas) {
      const sgDataUrl = sgCanvas.toDataURL('image/jpeg', 0.92);
      const [sgW, sgH] = [sgCanvas.width, sgCanvas.height];
      const SLIDE_W = 10, SLIDE_H = 5.625;
      const f = fitContain(sgW, sgH, SLIDE_W, SLIDE_H);
      const sgSlide = pptx.addSlide();
      sgSlide.background = { color: 'FFFFFF' };
      sgSlide.addImage({ data: sgDataUrl, x: f.ox, y: f.oy, w: f.w, h: f.h });
    }
  }

  const caseName = CASES[currentCaseKey].name;
  const dateStr = new Date().toLocaleDateString('zh-TW', { timeZone: 'Asia/Taipei' }).replace(/\//g, '-');
  try {
    await pptx.writeFile({ fileName: `${caseName}_市調簡報_${dateStr}.pptx` });
  } catch (e) {
    console.error('PPT 匯出失敗：', e);
    alert('PowerPoint 匯出失敗，請稍後再試一次。若持續失敗，可能是某張圖片網址有問題，建議改用本機上傳後再匯出。');
  }
}
async function captureSalesGridCanvas() {
  const key = currentCaseKey;
  if (!key || !CASES[key]?.salesGrid) return null;

  renderSalesGrid(key);
  const root = document.getElementById('sales-grid-root');

  const captureEl = document.createElement('div');
  captureEl.style.cssText = [
    'position:fixed', 'top:0', 'left:-2000px',
    'width:1280px', 'background:#fff', 'padding:24px',
    'box-sizing:border-box', 'overflow:visible',
    'font-family:-apple-system,"PingFang TC","Helvetica Neue",sans-serif',
  ].join(';');
  captureEl.innerHTML = root.innerHTML;

  // 移除 overflow 限制，讓整張表完整顯示
  captureEl.querySelectorAll('.sg-wrap,.txn-wrap').forEach(el => { el.style.overflow = 'visible'; });
  // 移除 sticky 定位（html2canvas 不支援，會截到錯誤位置）
  captureEl.querySelectorAll('.sg-table thead th:first-child,.sg-table tbody th,.sg-sidebar').forEach(el => {
    el.style.position = 'relative';
    el.style.left = 'auto';
    el.style.top = 'auto';
  });
  // 移除互動按鈕
  captureEl.querySelectorAll('button').forEach(el => el.remove());

  document.body.appendChild(captureEl);
  await new Promise(r => setTimeout(r, 100));

  const W = captureEl.scrollWidth;
  const H = captureEl.scrollHeight;
  const canvas = await html2canvas(captureEl, {
    scale: 2, useCORS: true, allowTaint: true,
    backgroundColor: '#ffffff',
    width: W, height: H, windowWidth: W, windowHeight: H,
  });

  document.body.removeChild(captureEl);
  return canvas;
}

async function exportPdf() {
  if (typeof window.jspdf === 'undefined') {
    alert('PDF 匯出元件載入失敗，請確認網路連線後重新整理頁面再試一次。');
    return;
  }
  const { jsPDF } = window.jspdf;
  const savedPageIdx = activePageIdx;
  const totalSlides = imagePages.length + 1;
  const PAGE_W = 10, PAGE_H = 5.625; // 16:9，單位 inch

  const pdf = new jsPDF({ orientation: 'landscape', unit: 'in', format: [PAGE_W, PAGE_H] });

  for (let i = 0; i < totalSlides; i++) {
    if (i > 0) pdf.addPage([PAGE_W, PAGE_H]);
    activePageIdx = i;
    render();
    const slideEl = document.getElementById('slide');
    await waitForImages(slideEl, 4000);
    const prevTransform = slideEl.style.transform;
    slideEl.style.transform = 'scale(1)';
    await new Promise(r => setTimeout(r, 50));
    try {
      const canvas = await html2canvas(slideEl, {
        scale: 2, useCORS: true, allowTaint: true,
        width: 1280, height: 720, backgroundColor: '#ffffff',
      });
      pdf.addImage(canvas.toDataURL('image/jpeg', 0.92), 'JPEG', 0, 0, PAGE_W, PAGE_H);
    } catch (e) {
      console.warn('投影片截圖失敗（頁碼 ' + i + '）：', e);
    }
    slideEl.style.transform = prevTransform;
  }

  activePageIdx = savedPageIdx;
  render();

  // 銷控表頁（完整截圖，不裁切）
  if (currentCaseKey && CASES[currentCaseKey]?.salesGrid) {
    const sgCanvas = await captureSalesGridCanvas();
    if (sgCanvas) {
      const sgPageH = PAGE_W * sgCanvas.height / sgCanvas.width;
      pdf.addPage([PAGE_W, sgPageH]);
      pdf.addImage(sgCanvas.toDataURL('image/jpeg', 0.92), 'JPEG', 0, 0, PAGE_W, sgPageH);
    }
  }

  const caseName = CASES[currentCaseKey].name;
  const dateStr = new Date().toLocaleDateString('zh-TW', { timeZone: 'Asia/Taipei' }).replace(/\//g, '-');
  pdf.save(`${caseName}_市調簡報_${dateStr}.pdf`);
}

async function exportAs(format) {
  closeExportMenu();
  if (format === 'pdf') {
    await exportPdf();
    return;
  }
  if (format === 'pptx' || format === 'keynote') {
    await exportPptx();
    if (format === 'keynote') {
      alert('已下載 PowerPoint 檔（.pptx）。請用 Keynote 開啟（File → Open），會自動轉換成 Keynote 原生格式。');
    }
    return;
  }
}
function openControl() { document.getElementById('control-panel').classList.add('active'); }
function closeControl() { document.getElementById('control-panel').classList.remove('active'); }

/* ───────────── 初始化（記住上次開啟時看的是哪個案子） ───────────── */
populateCaseSelect();
const lastCase = localStorage.getItem(LAST_CASE_KEY);
loadCase((lastCase && CASES[lastCase]) ? lastCase : 'chengyu');
</script>
